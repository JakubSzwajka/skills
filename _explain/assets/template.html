<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <style>
    :root {
      --bg: #0d0d0d;
      --bg-panel: #141414;
      --text: #e0e0e0;
      --text-dim: #999999;
      --accent: #ccff00;
      --border: #333333;
      --grid-line: rgba(255, 255, 255, 0.05);
      --green: #9ece6a;
      --orange: #ff9e64;
      --red: #f7768e;
      --yellow: #e0af68;
      --purple: #bb9af7;
      --cyan: #7dcfff;
      --font-mono: 'JetBrains Mono', monospace;
      --font-heading: 'Space Grotesk', sans-serif;
      --sidebar-width: 220px;
    }

    ::selection {
      background: var(--accent);
      color: var(--bg);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 16px;
      line-height: 1.7;
    }

    /* Layout: sidebar + main */
    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar TOC */
    .sidebar {
      width: var(--sidebar-width);
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      padding: 2rem 1.5rem;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }
    .sidebar-title {
      font-family: var(--font-heading);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 1.5rem;
    }
    .sidebar ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .sidebar li {
      margin-bottom: 0.15rem;
    }
    .sidebar a {
      display: block;
      color: var(--text-dim);
      font-size: 0.8rem;
      text-decoration: none;
      padding: 0.3rem 0;
      border-left: 2px solid transparent;
      padding-left: 0.75rem;
      transition: color 0.15s, border-color 0.15s;
    }
    .sidebar a:hover,
    .sidebar a.active {
      color: var(--accent);
      border-left-color: var(--accent);
    }

    /* Main content */
    .main {
      flex: 1;
      max-width: 800px;
      padding: 4rem 3rem;
    }

    /* Header */
    .header {
      margin-bottom: 3rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .header h1 {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 0.75rem;
    }
    .header .context {
      color: var(--text-dim);
      font-size: 0.85rem;
    }

    /* Sections */
    .section {
      margin-bottom: 3rem;
    }
    .section h2 {
      font-family: var(--font-heading);
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
      line-height: 1.2;
    }
    .section h3 {
      font-family: var(--font-heading);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      margin: 2rem 0 0.75rem;
    }

    /* Prose */
    p { margin-bottom: 1.5rem; }
    a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 2px;
      transition: color 0.15s;
    }
    a:hover { text-decoration: none; }
    strong { color: var(--text); }
    em { font-style: italic; color: var(--text-dim); }

    ul, ol {
      margin: 0.5rem 0 1.5rem 1.5rem;
      color: var(--text-dim);
    }
    li { margin-bottom: 0.4rem; }

    /* Code */
    code {
      font-family: var(--font-mono);
      background: var(--bg-panel);
      border: 1px solid var(--border);
      padding: 2px 5px;
      font-size: 0.9em;
      color: var(--text);
    }
    pre {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      padding: 1.5rem;
      overflow-x: auto;
      margin: 2rem 0;
    }
    pre code {
      all: unset;
      font-family: var(--font-mono);
      color: var(--text-dim);
      font-size: 0.9em;
    }

    /* Callout boxes */
    .callout {
      padding: 1rem 1.2rem;
      margin: 2rem 0;
      border-left: 4px solid;
      background: var(--bg-panel);
    }
    .callout-info { border-color: var(--accent); }
    .callout-warning { border-color: var(--orange); }
    .callout-uncertainty { border-color: var(--yellow); }
    .callout-depends { border-color: var(--purple); }
    .callout-key { border-color: var(--green); }
    .callout .label {
      font-family: var(--font-heading);
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.4rem;
      display: block;
    }
    .callout-uncertainty .label { color: var(--yellow); }
    .callout-depends .label { color: var(--purple); }
    .callout-key .label { color: var(--green); }
    .callout-info .label { color: var(--accent); }
    .callout-warning .label { color: var(--orange); }

    /* Mermaid diagrams */
    .mermaid {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      padding: 1.5rem;
      margin: 2rem 0;
      text-align: center;
    }

    /* File references */
    .file-ref {
      font-family: var(--font-mono);
      font-size: 0.85em;
      color: var(--accent);
      background: var(--bg-panel);
      border: 1px solid var(--border);
      padding: 2px 5px;
    }

    /* Footer */
    .footer {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 0.8rem;
      text-transform: uppercase;
    }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 2rem 0;
    }
    th, td {
      text-align: left;
      padding: 0.6rem 0.8rem;
      border: 1px solid var(--border);
    }
    th {
      font-family: var(--font-heading);
      background: var(--bg-panel);
      color: var(--text);
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    td { background: transparent; }

    /* Blockquotes */
    blockquote {
      border-left: 4px solid var(--accent);
      padding-left: 1.5rem;
      font-style: italic;
      color: var(--text-dim);
      margin: 2rem 0;
    }

    /* Horizontal rules */
    hr {
      border: none;
      border-top: 1px dashed var(--border);
      margin: 3rem 0;
    }

    /* Mobile: sidebar collapses above content */
    @media (max-width: 860px) {
      .layout {
        flex-direction: column;
      }
      .sidebar {
        width: 100%;
        height: auto;
        position: static;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 1.5rem 2rem;
      }
      .sidebar ul {
        display: flex;
        flex-wrap: wrap;
        gap: 0.25rem 1rem;
      }
      .sidebar a {
        border-left: none;
        padding-left: 0;
      }
      .sidebar a:hover,
      .sidebar a.active {
        border-left: none;
      }
      .main {
        padding: 2rem 1.5rem;
      }
      .header h1 { font-size: 1.25rem; }
      .section h2 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <nav class="sidebar">
      <div class="sidebar-title">Contents</div>
      <ul id="sidebar-nav"></ul>
    </nav>
    <div class="main">

      {{CONTENT}}

      <div class="footer">
        generated by _explain · {{DATE}}
      </div>
    </div>
  </div>

  <script>
    // Build sidebar nav from section h2 headings
    (function() {
      const nav = document.getElementById('sidebar-nav');
      const headings = document.querySelectorAll('.section h2');
      headings.forEach(h => {
        const section = h.closest('.section');
        if (!section.id) return;
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = '#' + section.id;
        a.textContent = h.textContent;
        li.appendChild(a);
        nav.appendChild(li);
      });

      // Scroll-spy: highlight active section
      const links = nav.querySelectorAll('a');
      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            links.forEach(l => l.classList.remove('active'));
            const active = nav.querySelector('a[href="#' + entry.target.id + '"]');
            if (active) active.classList.add('active');
          }
        });
      }, { rootMargin: '-10% 0px -80% 0px' });

      document.querySelectorAll('.section[id]').forEach(s => observer.observe(s));
    })();

    // Mermaid init
    function initMermaid() {
      mermaid.initialize({
        startOnLoad: false,
        theme: 'dark',
        securityLevel: 'loose',
        themeVariables: {
          darkMode: true,
          background: '#0d0d0d',
          primaryColor: '#141414',
          primaryBorderColor: '#333333',
          primaryTextColor: '#e0e0e0',
          secondaryColor: '#141414',
          tertiaryColor: '#141414',
          lineColor: '#999999',
          textColor: '#e0e0e0',
          mainBkg: '#141414',
          nodeBorder: '#333333',
          clusterBkg: '#141414',
          clusterBorder: '#333333',
          titleColor: '#ccff00',
          edgeLabelBackground: '#0d0d0d',
          nodeTextColor: '#e0e0e0'
        }
      });
      document.querySelectorAll('.mermaid').forEach((el, i) => {
        const id = 'mermaid-' + i;
        const code = el.getAttribute('data-source') || el.textContent;
        el.setAttribute('data-source', code);
        el.innerHTML = '';
        mermaid.render(id, code).then(({svg}) => { el.innerHTML = svg; });
      });
    }
    initMermaid();
  </script>
</body>
</html>
